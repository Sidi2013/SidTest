<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="A sixth-grade arithmetic practice app with random problems and scoring."
    />
    <title>SidTest</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="intro-panel" aria-labelledby="app-title">
        <div>
          <p class="eyebrow">Sixth grade practice</p>
          <h1 id="app-title">SidTest</h1>
          <p class="intro-copy">
            Work through 12 random problems one at a time. Each answer is timed,
            then press Tab to check it and move to the next problem.
          </p>
        </div>

        <div class="score-card" aria-live="polite">
          <span class="score-label">Score</span>
          <strong id="scoreValue">0 / 12</strong>
          <span id="scoreMessage">Ready when you are.</span>
        </div>
      </section>

      <section class="control-bar" aria-label="Quiz controls">
        <div class="progress-wrap">
          <span id="answeredCount">0 answered</span>
          <div class="progress-track" aria-hidden="true">
            <span id="progressBar"></span>
          </div>
        </div>

        <div class="button-row">
          <button class="button secondary" type="button" id="newQuizButton">
            New problems
          </button>
          <button class="button primary" type="button" id="submitButton">
            Check answers
          </button>
        </div>
      </section>

      <form class="problem-grid" id="quizForm" aria-label="Arithmetic problems"></form>

      <section class="result-panel" id="resultPanel" hidden>
        <div>
          <p class="eyebrow">Results</p>
          <h2 id="resultTitle">Nice work.</h2>
          <p id="resultText"></p>
        </div>
        <button class="button primary" type="button" id="tryAgainButton">
          Try a new set
        </button>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
